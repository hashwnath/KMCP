version: "3.8"
services:
  mcp-server:
    build: .
    container_name: knowledgemcp-mcp
    ports: ["8000:8000"]
    env_file: .env
    command: uvicorn src.mcp_server.handler:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin-api:
    build: .
    container_name: knowledgemcp-admin
    ports: ["8081:8081"]
    env_file: .env
    command: uvicorn src.admin.handler:app --host 0.0.0.0 --port 8081 --reload

networks:
  default:
    name: knowledgemcp
